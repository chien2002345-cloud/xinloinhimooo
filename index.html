<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xin lỗi Nhi 💖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    text-align:center;
    overflow:hidden;
    height:100vh;

    background:linear-gradient(
        -45deg,
        #ff9a9e,
        #fad0c4,
        #fbc2eb,
        #a6c1ee
    );

    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

.container{

    position:relative;
    z-index:2;
    margin-top:25px;
    padding:20px;
}

img{

    width:300px;
    height:340px;
    object-fit:cover;
    max-width:90%;

    border-radius:22px;

    margin-bottom:20px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.25);

    transition:0.4s;
}

h1{

    color:#ff4d9d;

    font-size:30px;

    margin-bottom:15px;

    text-shadow:
    0 0 10px rgba(255,255,255,0.8),
    0 0 20px rgba(255,105,180,0.8);
}

p{

    color:#ff66b3;

    margin-bottom:20px;

    font-size:19px;

    text-shadow:
    0 0 8px rgba(255,255,255,0.8);
}

button{

    padding:16px 28px;

    border:none;

    border-radius:15px;

    font-size:20px;

    margin:10px;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 5px 15px rgba(0,0,0,0.15);
}

/* NÚT ĐỒNG Ý */

#yes{

    background:#ff4d6d;

    color:white;

    font-size:34px;

    padding:22px 40px;

    font-weight:bold;

    box-shadow:
    0 0 20px rgba(255,77,109,0.8),
    0 0 40px rgba(255,77,109,0.5);
}

#yes:hover{

    transform:scale(1.15);

    box-shadow:
    0 0 30px rgba(255,77,109,1),
    0 0 60px rgba(255,77,109,0.8);
}

#no{
    background:white;
}

/* TIM + STICKER */

.heart,
.sticker{

    position:fixed;

    bottom:-50px;

    animation:fly linear forwards;

    z-index:1;
}

@keyframes fly{

    0%{

        transform:
        translateY(0)
        rotate(0deg);

        opacity:1;
    }

    100%{

        transform:
        translateY(-110vh)
        rotate(360deg);

        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container">

<img
id="img"
src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
>

<h1 id="text"></h1>

<p id="subText"></p>

<button id="yes">
    Nhi chấp nhận
</button>

<button id="no">
    Hông bao giờ
</button>

</div>

<!-- NHẠC -->
<audio id="music" loop>
    <source src="maimai.mp3" type="audio/mpeg">
</audio>

<script>

let step = 0;

let texts = [

"Nhi xinh đẹp, siêu dễ thương, cho Chiến xin lỗi nhóoo",

"Biết ngay là không chấp nhận rồi mòoo",

"Cho Chiến xin lỗi đi mòoo",

"Này là lần cuối cùng rồi đó Nhi nghen",

"Thôi thì cho Nhi thêm 1 lần trả lời nữa đó",

"Lần cuối thật rồi nè"

];

let subTexts = [

"Nhi hông chọn hoặc thoát là tha lỗi cho Chiến rồi đó",

"Cho Nhi chọn suy nghĩ lại lần nữa nè",

"Nhi hông chọn hoặc thoát là tha lỗi cho Chiến rồi đó",

"Nhi hông chọn hoặc thoát là tha lỗi cho Chiến rồi đó",

"Nhi hông chọn hoặc thoát là tha lỗi cho Chiến rồi đó",

"Nhi hông chọn hoặc thoát là tha lỗi cho Chiến rồi đó"

];

let noTexts = [

"Hông bao giờ",

"Hông bao giờ",

"Đồng ý đi mòoo",

"Xin Nhi đồng ý đó",

"Đồng ý đi mòoo",

"Đồng ý đi mòoo"

];

let images = [

"https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif",

"https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif",

"https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif",

"https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif",

"https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif",

"https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"

];

let stickers = [

"🐱",
"💖",
"🐾",
"🥺",
"💕",
"🎀",
"✨"

];

let yes = document.getElementById("yes");

let no = document.getElementById("no");

let text = document.getElementById("text");

let subText = document.getElementById("subText");

let img = document.getElementById("img");

let music = document.getElementById("music");

/* PHÁT NHẠC */

document.body.addEventListener(

"click",

()=>{

    music.volume = 1;

    music.play();

},

{once:true}

);

/* TIM BAY */

function createHeart(){

    let heart =
    document.createElement("div");

    heart.className = "heart";

    heart.innerHTML = "💖";

    heart.style.left =
    Math.random()*100 + "vw";

    heart.style.fontSize =
    (Math.random()*20+10)+"px";

    heart.style.animationDuration =
    (Math.random()*3+3)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{

        heart.remove();

    },5000);
}

setInterval(createHeart,300);

/* STICKER BAY */

function createSticker(){

    let s =
    document.createElement("div");

    s.className = "sticker";

    s.innerHTML =

    stickers[
        Math.floor(
            Math.random()*stickers.length
        )
    ];

    s.style.left =
    Math.random()*100 + "vw";

    s.style.fontSize =
    (Math.random()*25+15)+"px";

    s.style.animationDuration =
    (Math.random()*4+4)+"s";

    document.body.appendChild(s);

    setTimeout(()=>{

        s.remove();

    },6000);
}

setInterval(createSticker,500);

text.innerText = texts[0];

subText.innerText = subTexts[0];

no.innerText = noTexts[0];

/* BẤM KHÔNG */

no.onclick = ()=>{

    if(step < 5){

        step++;

        text.innerText =
        texts[step];

        subText.innerText =
        subTexts[step];

        no.innerText =
        noTexts[step];

        img.style.opacity = 0;

        setTimeout(()=>{

            img.src = images[step];

            img.style.opacity = 1;

        },200);

        yes.style.fontSize =
        (34 + step*6) + "px";

        yes.style.padding =
        (22 + step*2) + "px " +
        (40 + step*4) + "px";

        no.style.fontSize =
        Math.max(10,18-step*2) + "px";
    }

    if(step === 5){

        no.style.position =
        "absolute";

        no.onmouseover = ()=>{

            let x =

            Math.random() *

            (window.innerWidth - 120);

            let y =

            Math.random() *

            (window.innerHeight - 60);

            no.style.left =
            x + "px";

            no.style.top =
            y + "px";
        };
    }

};

/* BẤM ĐỒNG Ý */

yes.onclick = ()=>{

    text.innerText =

    "Nhi đồng ý rồi nhá 💖 Giờ thì đừng có bơ tin nhắn của Chiến đó nghen 🥰";

    subText.innerText =

    "( Nhi mặc váy vào đi tối Chiến đón đi kara oke 💕 )";

    img.src =

   "https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif";

    yes.style.display =
    "none";

    no.style.display =
    "none";

    for(let i=0;i<40;i++){

        createHeart();
    }

};

</script>

</body>
</html>
